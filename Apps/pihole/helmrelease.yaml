apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole-web
  namespace: pihole
spec:
  interval: 10m
  chart:
    spec:
      chart: pihole
      version: "2.26.1"
      sourceRef:
        kind: HelmRepository
        name: pihole
        namespace: flux-system
  install:
    createNamespace: true
  valuesFrom:
    - kind: Secret
      name: pihole-admin
      valuesKey: andor
      targetPath: adminPassword
  values:
    serviceDns:
      type: LoadBalancer
    serviceWeb:
      type: ClusterIP
      http:
        enabled: true
        port: 80
    persistentVolumeClaim:
      enabled: true
