apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Andor Homelab
    theme: dark
    color: slate
    headerStyle: boxed
    iconStyle: theme
    useEqualHeights: true
    layout:
      Monitoring:
        style: row
        columns: 2
        icon: mdi-chart-line
      Utilities:
        style: row
        columns: 3
        icon: mdi-toolbox
  custom.css: |
    /* Background */
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f172a 100%);
      background-attachment: fixed;
    }

    /* Glassmorphism service cards */
    .service-card {
      background: rgba(15, 23, 42, 0.55) !important;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.08) !important;
      transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .service-card:hover {
      border-color: rgba(148, 163, 184, 0.25) !important;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    /* Section headers */
    #information-widgets {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
      border-radius: 0.75rem;
      border: 1px solid rgba(148, 163, 184, 0.06);
    }

    /* Subtle header glow */
    #site-header {
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(16px);
    }
  custom.js: ""
  bookmarks.yaml: |
    - Homelab:
        - GitHub Repo:
            - abbr: GH
              href: https://github.com/kola0031/homelab
  services.yaml: |
    - Monitoring:
        - Grafana:
            href: http://grafana.local
            description: Metrics dashboards
            icon: grafana.png
            widget:
              type: grafana
              url: http://prometheus-grafana.default.svc.cluster.local
              username: admin
              password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"

        - Prometheus:
            href: http://prometheus.local
            description: Metrics collection
            icon: prometheus.png
            widget:
              type: prometheus
              url: http://prometheus-kube-prometheus-prometheus.default.svc.cluster.local:9090

    - Utilities:
        - Pi-hole:
            href: http://pihole.local
            description: Network-wide ad blocker
            icon: pihole.png
            widget:
              type: pihole
              url: http://pihole-web.pihole.svc.cluster.local:80
              version: 6
              key: "{{HOMEPAGE_VAR_PIHOLE_API_KEY}}"
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "andor-cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: google
        target: _blank
  docker.yaml: ""
  proxies.yaml: ""
  proxmox.yaml: ""
