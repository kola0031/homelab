apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: default
spec:
  parentRefs:
  - name: homelab-gateway
    namespace: monitoring
  hostnames:
  - "alertmanager.local"
  rules:
  - backendRefs:
    - name: prometheus-kube-prometheus-alertmanager
      port: 9093