apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-envoy-gateway
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infrastructure-crds
  path: ./infrastructure/envoy-gateway
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system